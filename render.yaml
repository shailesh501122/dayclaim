services:
  - type: web
    name: dayclaim
    runtime: static
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Vite bakes this in at build time (static sites have no server-side
      # runtime env), so changing it requires a rebuild, not just a restart.
      - key: VITE_API_BASE_URL
        value: https://dayclaim-ar-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://dayclaim-ar-api.onrender.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
